<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="card">
        <h1>Number Guess</h1>
        <p id="intro" class="intro muted">Starting a new round…</p>
        <p id="attempts" class="attempts" hidden></p>

        <form id="guess-form" class="row" autocomplete="off">
            <label class="sr-only" for="guess-input">Your guess</label>
            <input type="number" id="guess-input" name="guess" inputmode="numeric" required disabled>
            <button type="submit" id="guess-btn" disabled>Guess</button>
        </form>

        <p id="feedback" class="feedback" role="status" aria-live="polite"></p>

        <div class="actions">
            <button type="button" id="new-game-btn" class="secondary">New game</button>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
